<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Core Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #030a16;
            --accent-main: #00f3ff;
            --accent-dark: rgba(0, 243, 255, 0.1);
            --glow-strong: 0 0 15px rgba(0, 243, 255, 0.8), 0 0 30px rgba(0, 243, 255, 0.4);
            --glow-soft: 0 0 10px rgba(0, 243, 255, 0.3);
            --text-main: #e0ffff;
        }

        body {
            margin: 0;
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- IMMERSIVE BACKGROUND EFFECTS --- */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        .grid-bg {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--accent-dark) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-dark) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* --- HUD ROTATING RINGS (THE "EYE") --- */
        .hud-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid transparent;
        }

        .ring-1 {
            width: 100%; height: 100%;
            border-top: 2px solid var(--accent-main);
            border-bottom: 2px solid var(--accent-main);
            animation: spin 15s linear infinite;
            box-shadow: var(--glow-soft);
        }

        .ring-2 {
            width: 85%; height: 85%;
            border-left: 2px dashed var(--accent-main);
            border-right: 2px dashed var(--accent-main);
            animation: spin-reverse 20s linear infinite;
        }

        .ring-3 {
            width: 70%; height: 70%;
            border-top: 4px solid var(--accent-main);
            animation: spin 10s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .core {
            width: 20%; height: 20%;
            background: radial-gradient(circle, var(--accent-main) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* --- LAYOUT PANELS --- */
        .layout-container {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
        }

        .sci-fi-panel {
            background: rgba(3, 10, 22, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* Sci-Fi Corner Brackets */
        .sci-fi-panel::before, .sci-fi-panel::after {
            content: ''; position: absolute; width: 15px; height: 15px;
            border: 2px solid var(--accent-main);
            box-shadow: var(--glow-strong);
        }
        .sci-fi-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .sci-fi-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .sidebar {
            width: 320px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- UI ELEMENTS --- */
        h2, h3 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: var(--glow-soft);
            border-bottom: 1px solid var(--accent-dark);
            padding-bottom: 10px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        label {
            font-size: 12px;
            color: #88c0d0;
            text-transform: uppercase;
        }

        select, input {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 10px;
            color: var(--accent-main);
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            box-shadow: var(--glow-soft);
            border-color: var(--accent-main);
        }

        /* --- CHAT WINDOW --- */
        .chat-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            background: linear-gradient(90deg, rgba(0,243,255,0.1), transparent);
        }

        .messages-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Custom Scrollbar */
            scrollbar-width: thin;
            scrollbar-color: var(--accent-main) transparent;
        }

        .messages-window::-webkit-scrollbar { width: 5px; }
        .messages-window::-webkit-scrollbar-thumb { background: var(--accent-main); }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            line-height: 1.5;
            position: relative;
            border-left: 3px solid transparent;
        }

        .message.jarvis {
            align-self: flex-start;
            background: rgba(0, 243, 255, 0.05);
            border-left-color: var(--accent-main);
            box-shadow: -5px 0 15px rgba(0, 243, 255, 0.1);
        }

        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border-right: 3px solid #fff;
            text-align: right;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
        }

        .btn-send {
            background: transparent;
            color: var(--accent-main);
            border: 1px solid var(--accent-main);
            padding: 0 25px;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-send:hover {
            background: var(--accent-main);
            color: #000;
            box-shadow: var(--glow-strong);
        }

        /* --- ANIMATIONS --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; box-shadow: var(--glow-strong); } }
        
        /* Blinking cursor for typing */
        .typing::after {
            content: '█';
            animation: blink 1s infinite;
            color: var(--accent-main);
            margin-left: 5px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Random data readouts */
        .data-stream {
            font-size: 10px;
            color: var(--accent-dark);
            margin-top: auto;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="grid-bg"></div>

    <div class="hud-center">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="core"></div>
    </div>

    <div class="layout-container">
        
        <div class="sci-fi-panel sidebar">
            <h2>J.A.R.V.I.S.</h2>
            <div style="font-size: 10px; color: var(--accent-main);">V. 2.4.1 // SYSTEM ONLINE</div>
            
            <div class="setting-group">
                <label>Auth Protocol</label>
                <select id="tierSelect" onchange="toggleTierInput()">
                    <option value="byok">Local API Override (BYOK)</option>
                    <option value="sub">Stark Server Uplink (Sub)</option>
                </select>
            </div>

            <div class="setting-group" id="apiKeyGroup">
                <label>Gemini Auth Token</label>
                <input type="password" id="userApiKey" placeholder="Enter security key...">
            </div>

            <div class="data-stream" id="dataStream">
                MEM: 0x8F9A2B<br>
                CPU: 12%<br>
                UPLINK: ESTABLISHED
            </div>
        </div>

        <div class="sci-fi-panel chat-container">
            <div class="chat-header">
                <h3>Main Console</h3>
                <div style="display: flex; align-items: center; gap: 10px; color: var(--accent-main);">
                    <span>LINK ACTIVE</span>
                    <div style="width: 8px; height: 8px; background: var(--accent-main); border-radius: 50%; box-shadow: var(--glow-strong); animation: pulse 1s infinite;"></div>
                </div>
            </div>

            <div class="messages-window" id="messagesWindow">
                </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Input directive..." onkeypress="handleEnter(event)">
                <button class="btn-send" onclick="sendMessage()">[ EXECUTE ]</button>
            </div>
        </div>
    </div>

    <script>
        // Fake memory stream updater for extra sci-fi feel
        setInterval(() => {
            const hex = Math.floor(Math.random()*16777215).toString(16).toUpperCase();
            const cpu = Math.floor(Math.random() * 30) + 10;
            document.getElementById('dataStream').innerHTML = `MEM: 0x${hex}<br>CPU: ${cpu}%<br>UPLINK: SECURE`;
        }, 1500);

        function toggleTierInput() {
            const tier = document.getElementById('tierSelect').value;
            document.getElementById('apiKeyGroup').style.display = tier === 'sub' ? 'none' : 'flex';
        }

        function handleEnter(e) {
            if(e.key === 'Enter') sendMessage();
        }

        // Typewriter Effect Function
        function typeWriter(element, text, speed = 20) {
            element.classList.add('typing');
            let i = 0;
            element.innerText = '';
            
            function type() {
                if (i < text.length) {
                    element.innerText += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    document.getElementById('messagesWindow').scrollTop = document.getElementById('messagesWindow').scrollHeight;
                } else {
                    element.classList.remove('typing');
                }
            }
            type();
        }

        // Initial Boot Sequence
        window.onload = () => {
            const initialMsg = document.createElement('div');
            initialMsg.className = 'message jarvis';
            document.getElementById('messagesWindow').appendChild(initialMsg);
            typeWriter(initialMsg, "Systems initialized. I am online and ready for your directives, sir.", 30);
        };

        function sendMessage() {
            const input = document.getElementById('userInput');
            const windowEl = document.getElementById('messagesWindow');
            const text = input.value.trim();
            if (!text) return;

            // User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerText = text;
            windowEl.appendChild(userMsg);

            input.value = '';
            windowEl.scrollTop = windowEl.scrollHeight;

            // Jarvis Processing Simulation
            setTimeout(() => {
                const jarvisMsg = document.createElement('div');
                jarvisMsg.className = 'message jarvis';
                windowEl.appendChild(jarvisMsg);
                
                const tier = document.getElementById('tierSelect').value;
                if (tier === 'byok' && !document.getElementById('userApiKey').value) {
                    typeWriter(jarvisMsg, "WARNING: Core connection failed. Please supply your API token in the security panel to bypass local restrictions.");
                } else {
                    typeWriter(jarvisMsg, `Directive received: Processing protocols for "${text}".`);
                }
            }, 600);
        }
    </script>
</body>
</html>
