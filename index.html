<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AI Workspace Orchestrator</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-color: #131a30;
            --accent-color: #00f0ff;
            --text-color: #e2e8f0;
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }

        /* Sidebar Settings Panel */
        .sidebar {
            width: 300px;
            background-color: var(--panel-color);
            border-right: 1px solid rgba(0, 240, 255, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        select, input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(200, 200, 200, 0.2);
            padding: 10px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Main Chat Simulation Window */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #111827 0%, #0a0f1d 100%);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .messages-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.jarvis {
            background-color: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.15);
            align-self: flex-start;
        }

        .message.user {
            background-color: #2563eb;
            align-self: flex-end;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-area input {
            flex: 1;
        }

        .btn-send {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover {
            box-shadow: 0 0 15px var(--accent-color);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">JARVIS OS</div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05)">
        
        <div class="setting-group">
            <label>Access Tier</label>
            <select id="tierSelect" onchange="toggleTierInput()">
                <option value="byok">Bring Your Own Key (Free Tier)</option>
                <option value="sub">Jarvis Premium Subscriber</option>
            </select>
        </div>

        <div class="setting-group" id="apiKeyGroup">
            <label>Google Gemini API Key</label>
            <input type="password" id="userApiKey" placeholder="AIzaSy...">
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h3 style="margin: 0; font-size: 16px;">Core Orchestrator</h3>
                <small style="color: var(--text-muted)">Awaiting commands...</small>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 12px; color: var(--text-muted)">System Online</span>
                <div class="status-dot"></div>
            </div>
        </div>

        <div class="messages-window" id="messagesWindow">
            <div class="message jarvis">
                Systems initialized. Good day. I am ready to assist with your Notion workspace, email workflows, or social automations. Please select your access tier on the left panel to connect my core processors.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Jarvis to execute a task...">
            <button class="btn-send" onclick="sendMessage()">Execute</button>
        </div>
    </div>

    <script>
        function toggleTierInput() {
            const tier = document.getElementById('tierSelect').value;
            const apiKeyGroup = document.getElementById('apiKeyGroup');
            if (tier === 'sub') {
                apiKeyGroup.style.display = 'none';
            } else {
                apiKeyGroup.style.display = 'flex';
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const window = document.getElementById('messagesWindow');
            if (!input.value.trim()) return;

            // Append User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerText = input.value;
            window.appendChild(userMsg);

            const userText = input.value;
            input.value = '';
            window.scrollTop = window.scrollHeight;

            // Simulated Jarvis Processing Delayed Response
            setTimeout(() => {
                const jarvisMsg = document.createElement('div');
                jarvisMsg.className = 'message jarvis';
                
                const tier = document.getElementById('tierSelect').value;
                if (tier === 'byok' && !document.getElementById('userApiKey').value) {
                    jarvisMsg.innerText = "Error: Core connection failed. Please supply your personal Gemini API key in the configuration sidebar to allow task execution.";
                } else {
                    jarvisMsg.innerText = `Command acknowledged: "${userText}". Processing simulation sequence...`;
                }
                
                window.appendChild(jarvisMsg);
                window.scrollTop = window.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
